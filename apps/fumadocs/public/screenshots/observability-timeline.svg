<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img">
  <title>Observability timeline screenshot</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="38" y="40" width="1124" height="640" rx="28" fill="#ffffff" stroke="#e4dbff"/>
  <text x="74" y="94" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Observability</text>
  <text x="74" y="124" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Follow a webhook from receipt to job execution, notification, and billing.</text>
  <rect x="74" y="164" width="280" height="478" rx="24" fill="#0f172a"/>
  <text x="100" y="206" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Filters</text>
  <rect x="100" y="230" width="228" height="38" rx="19" fill="#111827" stroke="#1f2937"/>
  <rect x="100" y="280" width="228" height="38" rx="19" fill="#111827" stroke="#1f2937"/>
  <rect x="100" y="330" width="228" height="38" rx="19" fill="#111827" stroke="#1f2937"/>
  <rect x="100" y="380" width="228" height="38" rx="19" fill="#111827" stroke="#1f2937"/>
  <rect x="100" y="430" width="228" height="38" rx="19" fill="#111827" stroke="#1f2937"/>
  <text x="126" y="255" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Webhook</text>
  <text x="126" y="305" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Review</text>
  <text x="126" y="355" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Billing</text>
  <text x="126" y="405" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Notification</text>
  <text x="126" y="455" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Job</text>
  <rect x="386" y="164" width="740" height="478" rx="24" fill="#0f172a"/>
  <text x="416" y="206" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Event timeline</text>
  <rect x="430" y="248" width="12" height="310" rx="6" fill="url(#line)"/>
  <circle cx="436" cy="266" r="12" fill="#8b5cf6"/>
  <circle cx="436" cy="338" r="12" fill="#2563eb"/>
  <circle cx="436" cy="410" r="12" fill="#14b8a6"/>
  <circle cx="436" cy="482" r="12" fill="#f59e0b"/>
  <text x="470" y="272" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Webhook receipt stored</text>
  <text x="470" y="298" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">GitHub delivery id, repository, event, action, payload preview</text>
  <text x="470" y="344" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Review job queued</text>
  <text x="470" y="370" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">Durable execution, retries, and review output capture</text>
  <text x="470" y="416" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Notification delivered</text>
  <text x="470" y="442" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">Slack alert, severity warning, category review</text>
  <text x="470" y="488" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Billing settled</text>
  <text x="470" y="514" font-family="Inter, Arial, sans-serif" font-size="13" fill="#94a3b8">Generation usage, wallet debit, and cost lookup</text>
  <rect x="830" y="248" width="250" height="310" rx="20" fill="#111827" stroke="#1f2937"/>
  <text x="856" y="286" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Trace details</text>
  <text x="856" y="322" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">Source ID</text>
  <text x="856" y="350" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">pr-218</text>
  <text x="856" y="392" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">Status</text>
  <text x="856" y="420" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#22c55e">processed</text>
  <text x="856" y="462" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">Duration</text>
  <text x="856" y="490" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">4m 12s</text>
  <rect x="856" y="528" width="172" height="14" rx="7" fill="url(#line)"/>
</svg>
