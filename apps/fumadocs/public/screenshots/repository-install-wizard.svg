<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img">
  <title>Repository install wizard with provider and path steps</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="636" rx="28" fill="#fff" stroke="#dbe4f0"/>
  <rect x="42" y="42" width="1116" height="92" rx="28" fill="url(#accent)"/>
  <text x="76" y="94" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#fff">Repository install wizard</text>
  <text x="76" y="120" font-family="Inter, Arial, sans-serif" font-size="14" fill="#cbd5e1">Provider access, repository selection, sync health, and config in one guided flow.</text>

  <rect x="76" y="168" width="500" height="222" rx="24" fill="url(#panel)" stroke="#dbe4f0"/>
  <text x="106" y="208" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">01  Connect the provider</text>
  <text x="106" y="236" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Use the installed provider account or app-scoped access.</text>
  <rect x="106" y="262" width="178" height="70" rx="18" fill="#0f172a"/>
  <text x="132" y="292" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">GitHub</text>
  <text x="132" y="316" font-family="Inter, Arial, sans-serif" font-size="12" fill="#cbd5e1">App installation</text>
  <rect x="302" y="262" width="178" height="70" rx="18" fill="#ffffff" stroke="#dbe4f0"/>
  <text x="328" y="292" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f172a">GitLab</text>
  <text x="328" y="316" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">OAuth connection</text>
  <rect x="106" y="346" width="374" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="106" y="346" width="224" height="22" rx="11" fill="#22c55e"/>

  <rect x="600" y="168" width="524" height="222" rx="24" fill="url(#panel)" stroke="#dbe4f0"/>
  <text x="630" y="208" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">02  Add a repository path</text>
  <text x="630" y="236" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Add one repo or project at a time so the install stays explicit.</text>
  <rect x="630" y="262" width="464" height="54" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="654" y="294" font-family="Inter, Arial, sans-serif" font-size="16" fill="#94a3b8">owner/repo</text>
  <rect x="630" y="332" width="196" height="34" rx="17" fill="#e0f2fe"/>
  <text x="658" y="354" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0369a1">Selected repositories</text>
  <rect x="840" y="332" width="254" height="34" rx="17" fill="#f3e8ff"/>
  <text x="868" y="354" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#7e22ce">Webhook and sync queued</text>

  <rect x="76" y="418" width="724" height="198" rx="24" fill="url(#panel)" stroke="#dbe4f0"/>
  <text x="106" y="458" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">03  Repository config</text>
  <text x="106" y="486" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">A .gitpal.yaml file can override workspace defaults for this repo.</text>
  <rect x="106" y="510" width="620" height="80" rx="18" fill="#0f172a"/>
  <text x="132" y="540" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#cbd5e1">version: 1</text>
  <text x="132" y="562" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#cbd5e1">settings:</text>
  <text x="180" y="584" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#cbd5e1">reviews.behavior.profile: chill</text>

  <rect x="824" y="418" width="300" height="198" rx="24" fill="url(#panel)" stroke="#dbe4f0"/>
  <text x="854" y="458" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">04  Sync health</text>
  <text x="854" y="486" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Webhooks and sync queue automatically after install.</text>
  <rect x="854" y="510" width="92" height="34" rx="17" fill="#dcfce7"/>
  <text x="874" y="532" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#15803d">Healthy</text>
  <rect x="854" y="558" width="190" height="44" rx="14" fill="#0f172a"/>
  <text x="904" y="586" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">Open repositories</text>
</svg>
