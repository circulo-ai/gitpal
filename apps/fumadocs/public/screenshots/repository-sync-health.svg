<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none" role="img">
  <title>Repository sync health and retry controls</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="636" rx="28" fill="#fff" stroke="#dbe4f0"/>
  <rect x="42" y="42" width="1116" height="84" rx="28" fill="#0f172a"/>
  <circle cx="86" cy="84" r="10" fill="#22c55e"/>
  <text x="116" y="91" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Repositories</text>
  <text x="76" y="178" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">Repository sync health</text>
  <text x="76" y="208" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">Provider state, last successful reconciliation, and retry controls.</text>
  <rect x="76" y="246" width="1048" height="92" rx="20" fill="#f8fafc" stroke="#dbe4f0"/>
  <circle cx="114" cy="292" r="18" fill="#dcfce7"/>
  <path d="m106 292 6 6 11-13" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="150" y="282" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">mhbdev/dotton-sdk</text>
  <text x="150" y="310" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Last successful sync 3 minutes ago</text>
  <rect x="775" y="271" width="105" height="40" rx="20" fill="#dcfce7"/>
  <text x="800" y="297" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#15803d">Healthy</text>
  <rect x="900" y="264" width="190" height="54" rx="14" fill="#0f172a"/>
  <text x="958" y="297" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Sync now</text>
  <rect x="76" y="362" width="1048" height="152" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
  <circle cx="114" cy="408" r="18" fill="#ffedd5"/>
  <path d="M114 397v14m0 7v1" stroke="#ea580c" stroke-width="3" stroke-linecap="round"/>
  <text x="150" y="401" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#9a3412">Sync needs attention</text>
  <text x="150" y="430" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9a3412">The provider request failed after the previous successful sync.</text>
  <text x="150" y="458" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">Last successful sync 2 hours ago</text>
  <rect x="900" y="396" width="190" height="54" rx="14" fill="#ea580c"/>
  <text x="950" y="429" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Retry sync</text>
  <rect x="76" y="546" width="1048" height="84" rx="20" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="108" y="579" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Duplicate GitHub hooks are reconciled automatically</text>
  <text x="108" y="605" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Concurrent syncs adopt the matching hook after GitHub returns its duplicate-hook validation response.</text>
</svg>
